name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/knowledge-base:latest
            ghcr.io/${{ env.OWNER }}/knowledge-base:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -t ed25519 ${{ secrets.DO_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to DigitalOcean
        run: |
          OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.DO_USERNAME }}@${{ secrets.DO_HOST }} bash -s << 'ENDSSH'
          set -e
          OWNER="nokijai"

          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u $OWNER --password-stdin

          docker pull ghcr.io/$OWNER/knowledge-base:latest

          docker stop knowledge-base 2>/dev/null || true
          docker rm knowledge-base 2>/dev/null || true

          docker run -d \
            --name knowledge-base \
            --restart unless-stopped \
            -p 3001:3000 \
            ghcr.io/$OWNER/knowledge-base:latest

          docker image prune -f

          sleep 3
          curl -sf http://localhost:3001 > /dev/null && echo "✅ Knowledge base is live"
          ENDSSH
