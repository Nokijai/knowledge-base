name: Add Deploy Key

on:
  workflow_dispatch:

jobs:
  add-key:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -t ed25519 ${{ secrets.DO_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Add dashboard deploy public key to authorized_keys
        env:
          DASHBOARD_PUBKEY: ${{ secrets.DASHBOARD_DEPLOY_PUBKEY }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.DO_USERNAME }}@${{ secrets.DO_HOST }} \
            "grep -qxF '${DASHBOARD_PUBKEY}' ~/.ssh/authorized_keys || echo '${DASHBOARD_PUBKEY}' >> ~/.ssh/authorized_keys && echo 'done' && tail -2 ~/.ssh/authorized_keys"
